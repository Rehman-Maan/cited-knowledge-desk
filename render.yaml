services:
  - type: keyvalue
    name: cited-knowledge-desk-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: render-free-preview

  - type: web
    name: cited-knowledge-desk
    runtime: docker
    plan: free
    repo: https://github.com/Rehman-Maan/cited-knowledge-desk
    branch: main
    healthCheckPath: /health/
    autoDeployTrigger: checksPass
    dockerCommand: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py seed_public_demo && daphne -b 0.0.0.0 -p ${PORT:-8000} config.asgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: cited-knowledge-desk-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cited-knowledge-desk-redis
          property: connectionString
      - key: DOCUMENT_INGESTION_AUTO_QUEUE
        value: "False"
      - key: EMBEDDING_PROVIDER
        value: local
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: "1536"
      - key: LLM_PROVIDER
        value: local
      - key: LLM_MODEL
        value: local-demo
      - key: LLM_MAX_OUTPUT_TOKENS
        value: "700"
      - key: OPENAI_API_KEY
        value: ""
      - key: DEMO_USERNAME
        value: demo_public
      - key: DEMO_USER_PASSWORD
        sync: false

databases:
  - name: cited-knowledge-desk-db
    databaseName: cited_knowledge_desk
    user: cited
    plan: free
