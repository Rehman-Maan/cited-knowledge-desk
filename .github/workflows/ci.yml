name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: cited_knowledge_desk
          POSTGRES_USER: cited
          POSTGRES_PASSWORD: cited
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cited -d cited_knowledge_desk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      SECRET_KEY: ci-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DATABASE_URL: postgres://cited:cited@localhost:5432/cited_knowledge_desk
      REDIS_URL: redis://localhost:6379/0
      DOCUMENT_INGESTION_AUTO_QUEUE: "False"
      EMBEDDING_PROVIDER: local
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIMENSIONS: "1536"
      LLM_PROVIDER: local
      LLM_MODEL: local-llm
      LLM_MAX_OUTPUT_TOKENS: "700"
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Django system check
        run: python manage.py check

      - name: Check migrations are committed
        run: python manage.py makemigrations --check --dry-run

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run tests
        run: python -m pytest

  docker:
    name: Docker build and scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cited-knowledge-desk:ci
          load: true

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cited-knowledge-desk:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
