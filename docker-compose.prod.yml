services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DEBUG: "False"
      DATABASE_URL: postgres://${POSTGRES_USER:-cited}:${POSTGRES_PASSWORD:-cited}@db:5432/${POSTGRES_DB:-cited_knowledge_desk}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    command: celery -A config worker --loglevel=info
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DEBUG: "False"
      DATABASE_URL: postgres://${POSTGRES_USER:-cited}:${POSTGRES_PASSWORD:-cited}@db:5432/${POSTGRES_DB:-cited_knowledge_desk}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cited_knowledge_desk}
      POSTGRES_USER: ${POSTGRES_USER:-cited}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-cited} -d $${POSTGRES_DB:-cited_knowledge_desk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  media_data:
  postgres_data:
  redis_data:
  static_data:
